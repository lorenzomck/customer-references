    <path d="M320 70L322 76L328 78L322 80L320 86L318 80L312 78L318 76Z" fill="#f0883e"/>
    <path d="M880 55L881.5 59L886 61L881.5 63L880 67L878.5 63L874 61L878.5 59Z" fill="#58a6ff"/>
    <path d="M750 270L752 276L758 278L752 280L750 286L748 280L742 278L748 276Z" fill="#3fb950"/>
    <path d="M150 250L151.5 254L156 256L151.5 258L150 262L148.5 258L144 256L148.5 254Z" fill="#a371f7"/>
    <path d="M1050 80L1051.5 84L1056 86L1051.5 88L1050 92L1048.5 88L1044 86L1048.5 84Z" fill="#f85149"/>
