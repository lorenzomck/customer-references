    <circle cx="60" cy="90" r="1.5" fill="#a371f7"/><circle cx="90" cy="90" r="1.5" fill="#f85149"/><circle cx="120" cy="90" r="1.5" fill="#f0883e"/><circle cx="150" cy="90" r="1.5" fill="#d29922"/><circle cx="180" cy="90" r="1.5" fill="#3fb950"/><circle cx="210" cy="90" r="1.5" fill="#58a6ff"/>
    <circle cx="60" cy="120" r="1.5" fill="#58a6ff"/><circle cx="90" cy="120" r="1.5" fill="#a371f7"/><circle cx="120" cy="120" r="1.5" fill="#f85149"/><circle cx="150" cy="120" r="1.5" fill="#f0883e"/><circle cx="180" cy="120" r="1.5" fill="#d29922"/><circle cx="210" cy="120" r="1.5" fill="#3fb950"/>
    <circle cx="60" cy="150" r="1.5" fill="#3fb950"/><circle cx="90" cy="150" r="1.5" fill="#58a6ff"/><circle cx="120" cy="150" r="1.5" fill="#a371f7"/><circle cx="150" cy="150" r="1.5" fill="#f85149"/><circle cx="180" cy="150" r="1.5" fill="#f0883e"/><circle cx="210" cy="150" r="1.5" fill="#d29922"/>
    <circle cx="60" cy="180" r="1.5" fill="#d29922"/><circle cx="90" cy="180" r="1.5" fill="#3fb950"/><circle cx="120" cy="180" r="1.5" fill="#58a6ff"/><circle cx="150" cy="180" r="1.5" fill="#a371f7"/><circle cx="180" cy="180" r="1.5" fill="#f85149"/><circle cx="210" cy="180" r="1.5" fill="#f0883e"/>
