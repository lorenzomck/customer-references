    <circle cx="990" cy="170" r="1.5" fill="#d29922"/><circle cx="1020" cy="170" r="1.5" fill="#3fb950"/><circle cx="1050" cy="170" r="1.5" fill="#58a6ff"/><circle cx="1080" cy="170" r="1.5" fill="#a371f7"/><circle cx="1110" cy="170" r="1.5" fill="#f85149"/><circle cx="1140" cy="170" r="1.5" fill="#f0883e"/>
    <circle cx="990" cy="200" r="1.5" fill="#f0883e"/><circle cx="1020" cy="200" r="1.5" fill="#d29922"/><circle cx="1050" cy="200" r="1.5" fill="#3fb950"/><circle cx="1080" cy="200" r="1.5" fill="#58a6ff"/><circle cx="1110" cy="200" r="1.5" fill="#a371f7"/><circle cx="1140" cy="200" r="1.5" fill="#f85149"/>
    <circle cx="990" cy="230" r="1.5" fill="#f85149"/><circle cx="1020" cy="230" r="1.5" fill="#f0883e"/><circle cx="1050" cy="230" r="1.5" fill="#d29922"/><circle cx="1080" cy="230" r="1.5" fill="#3fb950"/><circle cx="1110" cy="230" r="1.5" fill="#58a6ff"/><circle cx="1140" cy="230" r="1.5" fill="#a371f7"/>
